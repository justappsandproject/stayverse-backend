name: stayverse
description: "A new Flutter project."
publish_to: "none"
version: 1.0.31+31

environment:
  sdk: ">=3.0.0 <4.0.0"


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  logger:
  flutter_svg: ^2.0.7
  lottie: ^3.1.2
  equatable: ^2.0.5
  get_it: ^7.2.0
  dio: ^5.7.0
  http: ^1.1.0
  intl: any
  url_launcher: ^6.1.9
  pretty_dio_logger: ^1.3.1
  flutter_riverpod: ^2.3.0
  flutter_screenutil: ^5.8.4
  package_info_plus: ^8.1.1
  device_info_plus: ^11.1.1
  image_picker: ^1.1.2
  flutter_displaymode: ^0.6.0

       

  fixed_collections: ^0.5.0-beta
  flutter_datetime_picker_plus: ^2.0.1
  sentry: ^7.16.1
  gap: ^3.0.1
  shared_preferences: ^2.2.3
  envied: ^0.5.3
  json_annotation: ^4.8.0
  shimmer: ^3.0.0
  jiffy: ^6.2.1
  geolocator: ^12.0.0
  google_maps_utils: ^2.0.0+1
  flutter_animate: ^4.5.0
  google_maps_flutter: ^2.6.1
  flutter_rating_bar: ^4.0.1
  share_plus: ^11.0.0
  socket_io_client: ^3.0.0
  uuid: ^4.5.1
  synchronized: ^3.1.0+1
  firebase_core: ^3.7.0
  firebase_messaging: ^15.1.4
  firebase_analytics: ^11.3.4
  #Permissions
  permission_handler: ^11.3.1
  camera: ^0.10.6
  
  smooth_page_indicator: ^1.2.0+3
  pin_code_fields: ^8.0.1
  pinput: ^5.0.1
  calendar_date_picker2: ^1.1.8
  table_calendar: ^3.1.3
  carousel_slider: ^5.0.0
  photo_view: ^0.15.0
  flutter_image_compress: ^2.4.0

  webview_flutter: ^4.13.0

  rxdart: ^0.28.0
  rate_limiter: ^1.0.0

  stream_chat_flutter: ^9.14.0 
  stream_chat_persistence: ^9.14.0

  dart_extensions:
    git:
      url: https://github.com/venbrinoDev/dart_extensions.git
  money_formatter:
    git:
      url: https://github.com/venbrinoDev/money_formatter.git
  image_gallery_saver:
    git:
      url: https://github.com/venbrinoDev/image_gallery_saver.git
  gif: ^2.3.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  open_store: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  change_app_package_name: ^1.4.0
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^4.0.0
  mocktail: ^1.0.3
  build_runner: ^2.4.8
  json_serializable: ^6.1.5
  envied_generator: ^0.5.3
  dart_style: ^2.3.6
  simple_deploy: ^0.26.0


flutter:


  uses-material-design: true

  
  assets:
    - assets/
    - assets/images/
    - assets/images/icons/pngs/
    - assets/images/icons/pngs/2x/
    - assets/images/icons/pngs/3x/
    - assets/images/icons/svgs/
    - assets/images/pngs/
    - assets/images/pngs/2x/
    - assets/images/pngs/3x/
    - assets/images/svgs/
    - assets/images/gif/
    - assets/json/
    - .env

    
fonts:
  - family: Neue Montreal
    fonts:
      - asset: assets/fonts/neue_montreal/NeueMontreal-Light.otf
        weight: 100
      - asset: assets/fonts/neue_montreal/NeueMontreal-Light.otf
        weight: 200
      - asset: assets/fonts/neue_montreal/NeueMontreal-Light.otf
        weight: 300
      - asset: assets/fonts/neue_montreal/NeueMontreal-Regular.otf
        weight: 400
      - asset: assets/fonts/neue_montreal/NeueMontreal-Medium.otf
        weight: 500
      - asset: assets/fonts/neue_montreal/NeueMontreal-Bold.otf
        weight: 700